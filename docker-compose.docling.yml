version: '3.8'

services:
  rag-api-docling:
    build: ./api
    container_name: rag-api-docling
    ports:
      - "8002:8000"  # Docling test instance on port 8002
    volumes:
      - ./knowledge_base_docling:/app/knowledge_base:ro  # Docling test KB
      - ./data_docling:/app/data  # Separate docling database
      - ./.cache/deepsearch_glm:/app/.cache/deepsearch_glm  # DeepSearch GLM cache
      - ./.cache/docling:/home/appuser/.cache/docling  # Docling model cache
      - ./.cache/huggingface:/home/appuser/.cache/huggingface  # Hugging Face model cache (Docling models)
      - ./.cache/easyocr:/home/appuser/.EasyOCR  # EasyOCR model cache (detection models)
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_NAME=${MODEL_NAME:-snowflake/arctic-embed-l-v2.0}
      - BATCH_SIZE=${BATCH_SIZE:-5}
      - BATCH_DELAY=${BATCH_DELAY:-0.5}
      - WATCH_ENABLED=false  # Disable auto-watch for testing
      - USE_DOCLING=${USE_DOCLING:-true}  # Enable Docling PDF extraction
      - DOCLING_ARTIFACTS_PATH=/home/appuser/.cache/docling/models  # Docling cache path
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata  # Tesseract data path for OCR
    restart: "no"  # Don't auto-restart, manual control
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '${MAX_CPUS:-6.0}'
          memory: ${MAX_MEMORY:-6G}
        reservations:
          cpus: '0.5'
          memory: 512M
